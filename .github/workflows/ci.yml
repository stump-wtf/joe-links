name: CI/CD

on:
  push:
    # Every branch push must trigger CI: this repo is developed via Gitea PRs
    # and this workflow only runs on the GitHub push mirror, so branch push
    # runs are the merge gate. Do NOT narrow these branches — duplicate runs
    # are deduped by the concurrency group below instead. See issue #213.
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  # Manual lever: rerun CI or re-publish docs from main without a new commit.
  workflow_dispatch:

# A push run and a pull_request run for the same commit share a group, so the
# duplicate is cancelled instead of running lint+test twice. Tag runs and main
# runs are keyed by ref, not SHA: each gets a group no branch push or PR can
# join (a new branch whose head equals main's head would otherwise cancel the
# in-flight main run and silently lose its docs deploy), and tag runs are
# additionally never cancelled so an in-flight release cannot be killed by a
# branch push. See issue #213 and PR #250 review.
concurrency:
  group: ci-${{ (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') && github.ref || github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Default every job to a read-only token (PR #253 security review). Jobs that
# genuinely write (release upload, GHCR push, Pages deploy) already declare
# their own per-job permissions blocks, which override this default.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Pinned (not "latest") so lint results are reproducible; v2.x is
          # required for repos with a go >= 1.25 directive. See issue #213.
          version: v2.11.4

      - name: Check swagger spec is up to date
        # Governing: SPEC-0007 REQ "Spec Freshness in CI"
        # `make swagger` runs swag via `go run ...@$(SWAG_VERSION)`, pinned to
        # the go.mod version that generated the committed output — no unpinned
        # go-install that would break every run when a newer swag release
        # changes the generated output. See issue #213.
        run: |
          make swagger
          if ! git diff --exit-code docs/swagger/; then
            echo "::error::docs/swagger/ is stale. Run 'make swagger' and commit the result."
            exit 1
          fi
          if [ -n "$(git status --porcelain docs/swagger/)" ]; then
            echo "::error::docs/swagger/ has untracked files. Run 'make swagger' and commit the result."
            git status --porcelain docs/swagger/
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check built CSS is up to date
        # Same freshness contract as the swagger check above: the committed
        # web/static/css/app.css must match what `make css` produces from the
        # current templates, or Tailwind classes added in templates silently
        # ship unstyled to anyone running the committed artifact. Caught a
        # real instance on introduction (missing .tab styles). See issue #213.
        run: |
          npm ci --ignore-scripts
          npm run build
          if ! git diff --exit-code web/static/css/; then
            echo "::error::web/static/css/ is stale. Run 'npm ci && npm run build' (make css assumes fresh node_modules) and commit the result."
            exit 1
          fi
          if [ -n "$(git status --porcelain web/static/css/)" ]; then
            echo "::error::web/static/css/ has untracked files. Run 'npm ci && npm run build' and commit the result."
            git status --porcelain web/static/css/
            exit 1
          fi

      - name: Lint extension (AMO addons-linter)
        # Pinned (not "latest") so lint results are reproducible, same as
        # golangci-lint above. See issue #213.
        run: npx addons-linter@10.9.0 integrations/extension/ --min-manifest-version 3 --max-manifest-version 3 --warnings-as-errors=false

      - name: Validate extension JS syntax
        run: |
          node --check integrations/extension/background.js
          node --check integrations/extension/options.js
          node --check integrations/extension/popup.js
          test -f integrations/extension/icons/icon-16.png && test -f integrations/extension/icons/icon-48.png && test -f integrations/extension/icons/icon-128.png
          echo "Extension OK"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        # -race: the click-recording pipeline, session middleware, and MCP
        # handler all touch shared state from goroutines; run the detector in
        # CI where the extra runtime cost doesn't matter. See issue #213.
        run: go test -race ./...

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run extension unit tests
        # The shell expands the glob to explicit file paths, so this works on
        # Node < 21 (node --test only learned glob patterns in Node 21).
        run: node --test integrations/extension/*.test.mjs

  xcode:
    name: Xcode (unsigned build check)
    # Catches extension changes that break the committed Safari Web Extension
    # Xcode project (SPEC-0015, issue #133). Unsigned on purpose: no Apple
    # credentials in CI until #221/#134 land — CODE_SIGNING_ALLOWED=NO builds
    # everything except the signature. Gated behind a paths check so the slow
    # macOS runner only spins up when Apple/extension files changed.
    runs-on: ubuntu-latest
    # paths-filter reads the PR file list via the API on pull_request events.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      apple: ${{ steps.filter.outputs.apple }}
    steps:
      - uses: actions/checkout@v4
      # SHA-pinned (not a mutable tag): third-party action in the same niche
      # as the 2025 tj-actions/changed-files tag-repoint compromise. See PR
      # #253 security review.
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            apple:
              - 'integrations/apple/**'
              - 'integrations/extension/**'
              - '.github/workflows/ci.yml'

  xcode-build:
    name: Xcode build (macOS)
    needs: xcode
    if: needs.xcode.outputs.apple == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app (unsigned)
        run: |
          xcodebuild -project integrations/apple/joe-links.xcodeproj \
            -target "joe-links (macOS)" -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build

      - name: Build iOS app (unsigned, simulator SDK)
        run: |
          xcodebuild -project integrations/apple/joe-links.xcodeproj \
            -target "joe-links (iOS)" -sdk iphonesimulator -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build

  build:
    name: Build & Release
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build CSS
        run: npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile binaries
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          PKG="github.com/joestump/joe-links/internal/build"
          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              [ "$GOOS" = "windows" ] && [ "$GOARCH" = "arm64" ] && continue
              EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
              OUTPUT="dist/joe-links-${GOOS}-${GOARCH}${EXT}"
              GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build \
                -ldflags="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Branch=${BRANCH}" \
                -o "$OUTPUT" ./cmd/joe-links
              echo "Built $OUTPUT"
            done
          done

      - name: Package browser extension
        # icons/generate*.js are Node dev scripts, not extension code — AMO
        # flags unreferenced files in the package. Note the explicit file list
        # silently omits any newly added extension file (see PR #238).
        run: |
          cd integrations/extension
          zip -r ../../dist/joe-links-extension.zip \
            manifest.json background.js options.html options.js popup.html popup.js icons/ \
            -x "icons/generate*"
          echo "Packaged extension"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          # Allow updating a release that was pre-created (e.g. with custom notes).
          make_latest: "true"
          fail_on_unmatched_files: false

  docker:
    name: Docker
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          # latest=auto only moves :latest for non-prerelease semver tags, so
          # a v1.2.3-rc.1 tag no longer overwrites :latest (deferred from
          # PR #236 to issue #213). Previously a raw "latest" tag entry
          # applied it unconditionally to every tag build.
          flavor: |
            latest=auto

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BRANCH=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs:
    name: GitHub Pages
    needs: [lint, test]
    # Deploy on releases AND on main (push or workflow_dispatch), so docs and
    # spec changes merged to main publish without waiting for the next tag.
    # PR runs never match: their ref is refs/pull/N/merge. See issue #213.
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    # The release flow (merge to main, then tag the merge commit) fires two
    # runs in different ci-* groups, each reaching this job. GitHub Pages
    # allows only one in-flight deployment, so the later deploy-pages call
    # would 409 without serializing deployments here. Queue behind an
    # in-flight deploy; never cancel it. See PR #250 review.
    concurrency:
      group: github-pages
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Build docs site
        working-directory: docs-site
        run: npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

      - uses: actions/deploy-pages@v4
        id: deployment
