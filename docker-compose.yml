services:
  app:
    build: .
    ports:
      # JOE_HOST_PORT controls only the published host port. The container
      # side is fixed at 8080 (JOE_HTTP_ADDR is pinned below), so changing
      # the host port can never silently break the mapping.
      - "${JOE_HOST_PORT:-8080}:8080"
    env_file: .env
    environment:
      # Pin the in-container bind address. This overrides any JOE_HTTP_ADDR
      # from .env so the app always listens on the port the mapping targets.
      JOE_HTTP_ADDR: ":8080"
    volumes:
      - joe-data:/data
    restart: unless-stopped
    healthcheck:
      # /metrics is the unauthenticated Prometheus endpoint; busybox wget
      # ships in the alpine base image.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    profiles: [postgres]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: joe_links
      POSTGRES_USER: joe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  joe-data:
  pg-data:
