{{template "base" .}}

{{define "title"}}Dashboard — Joe Links{{end}}

{{define "content"}}
<h1 class="text-2xl font-bold mb-6">My Links</h1>

<!-- Governing: SPEC-0004 REQ "User Dashboard" — search input with HTMX debounce -->
<div class="flex flex-col sm:flex-row gap-3 mb-6">
    <input
        type="search"
        name="q"
        class="input input-bordered flex-1"
        placeholder="Search links by slug, URL, or description..."
        value="{{.Query}}"
        hx-get="/dashboard"
        hx-trigger="input changed delay:400ms, search"
        hx-target="#link-list"
        hx-include="this"
        hx-push-url="false"
    >
</div>

<!-- Governing: SPEC-0010 REQ "Dashboard Visibility Filtering" — My Links / Shared with me tabs -->
<!-- Governing: SPEC-0020 REQ "Staleness Views" — stale / never-clicked filters
     over the viewer's own dashboard scope, computed from link_clicks at query
     time in the store layer; archived links are out of scope. -->
<div class="tabs tabs-boxed mb-6 w-fit">
    <a class="tab {{if not .Filter}}tab-active{{end}}"
       hx-get="/dashboard"
       hx-target="#link-list"
       hx-push-url="false">My Links</a>
    <a class="tab {{if eq .Filter "shared"}}tab-active{{end}}"
       hx-get="/dashboard?filter=shared"
       hx-target="#link-list"
       hx-push-url="false">Shared with me</a>
    <a class="tab tooltip tooltip-bottom {{if eq .Filter "stale"}}tab-active{{end}}"
       data-tip="Created over 90 days ago, no clicks in the last 90 days"
       hx-get="/dashboard?filter=stale"
       hx-target="#link-list"
       hx-push-url="false">Stale</a>
    <a class="tab tooltip tooltip-bottom {{if eq .Filter "never-clicked"}}tab-active{{end}}"
       data-tip="Created over 7 days ago, never clicked"
       hx-get="/dashboard?filter=never-clicked"
       hx-target="#link-list"
       hx-push-url="false">Never clicked</a>
</div>

<!-- Governing: SPEC-0004 REQ "User Dashboard" — tag filter chips -->
{{if .Tags}}
<div class="flex flex-wrap gap-2 mb-6">
    <a href="/dashboard"
       class="badge badge-outline {{if not .Tag}}badge-primary{{end}} cursor-pointer"
       hx-get="/dashboard"
       hx-target="#link-list"
       hx-push-url="false">All</a>
    {{range .Tags}}
    <a href="/dashboard?tag={{.Slug}}"
       class="badge badge-outline {{if eq $.Tag .Slug}}badge-primary{{end}} cursor-pointer"
       hx-get="/dashboard?tag={{.Slug}}"
       hx-target="#link-list"
       hx-push-url="false">{{.Name}}</a>
    {{end}}
</div>
{{end}}

<!-- Governing: SPEC-0013 REQ "Create/Edit Link Form as HTMX Modal" — refresh on linkCreated/linkUpdated events -->
<div id="link-list"
     hx-get="/dashboard"
     hx-trigger="linkCreated from:body, linkUpdated from:body"
     hx-target="#link-list"
     hx-swap="innerHTML">
{{template "link_list" .}}
</div>
{{end}}
